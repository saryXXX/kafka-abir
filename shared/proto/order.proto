syntax = "proto3";
package order;

service OrderService {
  rpc CreateOrder (CreateOrderRequest) returns (OrderResponse);
  rpc GetOrder (OrderId) returns (OrderResponse);
  rpc GetUserOrders (UserId) returns (OrderList);
}

message OrderItem {
  string item_id = 1;
  string name = 2;
  int32 quantity = 3;
  double price = 4;
}

message CreateOrderRequest {
  string user_id = 1;
  string restaurant_id = 2;
  repeated OrderItem items = 3;
  string delivery_address = 4;
}

message OrderResponse {
  string id = 1;
  string user_id = 2;
  string restaurant_id = 3;
  repeated OrderItem items = 4;
  double total_price = 5;
  string status = 6;
  string delivery_address = 7;
  string driver_id = 8;
  string created_at = 9;
}

message OrderId {
  string id = 1;
}

message UserId {
  string id = 1;
}

message OrderList {
  repeated OrderResponse orders = 1;
}
